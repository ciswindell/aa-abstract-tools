version: '3.8'
services:
  streamlit-app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - PDF_BACKEND=pypdf
    restart: unless-stopped
    volumes:
      - ./:/app
    # Uncomment for development with hot reload
    # command: streamlit run streamlit_main.py --server.port=8501 --server.address=0.0.0.0 --server.runOnSave=true
